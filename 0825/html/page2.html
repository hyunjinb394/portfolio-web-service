     <div class="title">

     <img id ="image"

        푸바오는 전세계 판다 중에서 가장 예쁜 판다로 알려져있다.<br>

        엄마 아이바오를 닮아 또렷하다.<br>
        털 색이 꼬질한 것까지 완벽하게 귀여운 판다로 성장했다.
